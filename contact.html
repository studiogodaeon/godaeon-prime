<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - GODAEON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="src/style.css">
</head>
<body class="bg-black text-white is-loading">
    <div class="cyber-grid-bg"></div>
    

    <div id="dynamic-bg"></div>
    <div id="pixel-overlay"></div>

    <div class="menu-toggle-container">
        <div class="floating-menu-logo" id="floatingLogo">
            <i class="fas fa-cube text-red-600"></i> 
            <span>GODAEON</span>
        </div>
        <div class="menu-toggle-btn" id="menuToggle">
            <div class="menu-btn-content" id="menuBtnContent">
                <span>PRESS 'X'</span>
            </div>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay">
        <div class="wheel-svg-container" id="wheelSvgContainer">
            <div class="wheel-center" id="wheelCenter"><div class="w-2 h-2 bg-white rounded-full shadow-[0_0_10px_white]"></div></div>
            <svg width="600" height="600" viewBox="0 0 600 600" id="wheelSvg"></svg>
            <div class="wheel-content" id="wheelContent"></div>
        </div>
    </div>

    <div class="container mx-auto px-6 py-24 pb-40">
        
        <h1 class="text-5xl font-bold mb-12 text-center">GET IN <span class="text-red-600">TOUCH</span></h1>

        <div class="grid md:grid-cols-2 gap-12 max-w-5xl mx-auto">
            
            <div>
                <p class="text-xl text-gray-300 mb-8">For business, press, development, or investment inquiries.</p>
                
                <div class="space-y-6">
                    <div class="flex items-center gap-4 bg-gray-900 p-6 rounded border-l-4 border-red-600">
                        <i class="fas fa-envelope text-2xl text-red-600"></i>
                        <div>
                            <h3 class="font-bold text-sm text-gray-400 uppercase">Email</h3>
                            <p class="text-lg">official studio contact</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 bg-gray-900 p-6 rounded border-l-4 border-white">
                        <i class="fas fa-share-alt text-2xl text-white"></i>
                        <div>
                            <h3 class="font-bold text-sm text-gray-400 uppercase">Social Media</h3>
                            <div class="flex gap-4 mt-2 text-xl">
                                <a href="https://www.instagram.com/godaeon_studio?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" class="hover:text-red-600"><i class="fab fa-instagram"></i></a>
                                <a href="https://www.youtube.com/@GODAEON_STUDIO" class="hover:text-red-600"><i class="fab fa-youtube"></i></a>
                                <a href="https://www.linkedin.com/company/godaeon-studio/" class="hover:text-red-600"><i class="fab fa-linkedin"></i></a>
                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-900 p-8 rounded border border-gray-800">
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold mb-2 uppercase text-gray-400">Name</label>
                        <input type="text" class="w-full bg-black border border-gray-700 p-3 text-white focus:border-red-600 outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2 uppercase text-gray-400">Subject</label>
                        <select class="w-full bg-black border border-gray-700 p-3 text-white focus:border-red-600 outline-none transition-colors">
                            <option>General Inquiry</option>
                            <option>Investment / Partnership</option>
                            <option>Press</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2 uppercase text-gray-400">Message</label>
                        <textarea rows="5" class="w-full bg-black border border-gray-700 p-3 text-white focus:border-red-600 outline-none transition-colors"></textarea>
                    </div>
                    <button class="w-full bg-red-600 text-black font-bold py-3 uppercase tracking-widest hover:bg-white hover:text-red-600 transition-colors">
                        Send Message
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
