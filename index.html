<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODAEON - Red Line Nation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="src/style.css">
</head>
<body class="bg-black text-white is-loading">

    <div class="fullscreen-video-bg">
        <video autoplay loop muted playsinline>
            <source src="/media/radar.mp4" type="video/mp4">
        </video>
    </div>

    <div id="dynamic-bg"></div>
    <div id="pixel-overlay"></div>

    <div class="menu-toggle-container">
        <div class="floating-menu-logo" id="floatingLogo">
            <i class="fas fa-cube text-red-600"></i> 
            <span>GODAEON</span>
        </div>
        <div class="menu-toggle-btn" id="menuToggle">
            <div class="menu-btn-content" id="menuBtnContent">
                <span>PRESS 'X'</span>
            </div>
        </div>
    </div>

    <div class="menu-overlay" id="menuOverlay">
        <div class="wheel-svg-container" id="wheelSvgContainer">
            <div class="wheel-center" id="wheelCenter">
                <div class="w-2 h-2 bg-white rounded-full shadow-[0_0_10px_white]"></div>
            </div>
            <svg width="600" height="600" viewBox="0 0 600 600" id="wheelSvg"></svg>
            <div class="wheel-content" id="wheelContent"></div>
        </div>
    </div>

    <section class="hero-section" id="home">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="text-content-wrapper text-right">
                
                <h1 class="hero-title">RED LINE NATION</h1>
                
                <h2 class="hero-subtitle mb-4 text-xl tracking-widest text-gray-300">
                    Creating grounded, cinematic, and intelligent game worlds.
                </h2>
                
                <div class="border-r-4 border-red-600 pr-6 mb-8 py-2 bg-gradient-to-l from-red-900/20 to-transparent">
                    <h3 class="text-2xl font-bold text-white mb-2">RED LINE NATION</h3>
                    <p class="text-gray-400 italic">"The world saw his death as victory… but darkness has deeper roots."</p>
                </div>

                <div class="flex justify-end gap-4">
                    <a href="https://www.instagram.com/reel/DPhC8qJihML/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==" target="_blank" rel="noopener noreferrer" class="border border-white/30 px-8 py-3 uppercase tracking-widest text-sm hover:border-red-600 hover:text-red-500 transition-colors inline-block">
                        Watch Trailer
                    </a>
                    <a href="development.html" class="bg-red-600 text-black font-bold px-8 py-3 uppercase tracking-widest text-sm hover:bg-white transition-colors">
                        Follow Development
                    </a>
                </div>

            </div>
        </div>
    </section>

    <script type="module" src="src/main.js"></script>
</body>
</html>
